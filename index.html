<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Theme Toggle -->
    <button class="theme-toggle" onclick="window.themeManager.toggle()" title="Toggle theme">
        <span class="theme-icon">🌙</span>
    </button>

    <!-- Admin Login Button -->
    <button class="admin-btn" onclick="showAdminLogin()">Admin Login</button>

    <div class="container">
        <h1>🎁 My Wishlist</h1>

        <!-- Admin Controls -->
        <div id="adminControls" style="display: none;">
            <button class="add-btn" onclick="showAddForm()">+ Add Item</button>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <!-- Items Display -->
        <div id="wishlistItems"></div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="itemModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Add New Item</h2>
            <form id="itemForm">
                <label>Item Name *</label>
                <input type="text" id="itemName" required>
                
                <label>Price *</label>
                <input type="text" id="itemPrice" placeholder="$0.00" required>
                
                <label>Link</label>
                <input type="url" id="itemLink" placeholder="https://...">
                
                <label>Image URL</label>
                <input type="url" id="itemImage" placeholder="https://...">
                
                <label>Category</label>
                <select id="itemCategory">
                    <option value="">Select category...</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Books">Books</option>
                    <option value="Clothing">Clothing</option>
                    <option value="Games">Games</option>
                    <option value="Sports">Sports</option>
                    <option value="Other">Other</option>
                </select>
                
                <label>Priority</label>
                <select id="itemPriority">
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                </select>
                
                <label>Tags (comma-separated)</label>
                <input type="text" id="itemTags" placeholder="gaming, tech, gift">
                
                <label>Notes</label>
                <textarea id="itemNotes" rows="3"></textarea>
                
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" id="itemPrivate">
                    🔒 Private (Admin only)
                </label>
                
                <div class="form-actions">
                    <button type="submit" class="submit-btn">Save Item</button>
                    <button type="button" class="cancel-btn" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Info Modal -->
    <div id="infoModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeInfoModal()">&times;</span>
            <div id="infoContent"></div>
        </div>
    </div>

    <!-- Admin Login Modal -->
    <div id="adminModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeAdminModal()">&times;</span>
            <h2>Admin Login</h2>
            <form id="adminForm">
                <label>Password</label>
                <input type="password" id="adminPassword" required>
                <button type="submit" class="submit-btn">Login</button>
            </form>
        </div>
    </div>

    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getDatabase, ref, onValue, push, set, remove, update } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBxGcoSW3ls0o3BZI22o1hY_bHe_sdN23Y",
            authDomain: "wishlist-f5a40.firebaseapp.com",
            databaseURL: "https://wishlist-f5a40-default-rtdb.firebaseio.com",
            projectId: "wishlist-f5a40",
            storageBucket: "wishlist-f5a40.firebasestorage.app",
            messagingSenderId: "562033032516",
            appId: "1:562033032516:web:5f8f6b6ddb8c97d6e2d2f2"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getDatabase(app);
        window.dbRef = ref;
        window.dbOnValue = onValue;
        window.dbPush = push;
        window.dbSet = set;
        window.dbRemove = remove;
        window.dbUpdate = update;

        loadWishlist();
    </script>

    <!-- Load feature modules -->
    <script src="theme.js"></script>
    <script src="tags.js"></script>
    <script src="claimed.js"></script>
    <script src="private.js"></script>
    <script src="pricetracking.js"></script>
    <script src="script.js"></script>
</body>
</html>
