<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wishlist</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Admin Login (top-right corner) -->
  <div class="admin-controls">
    <button id="adminBtn" class="admin-btn" onclick="toggleAdmin()">Admin</button>
  </div>

  <!-- Admin Password Modal -->
  <div class="modal" id="adminModal">
    <div class="modal-content">
      <h3>Admin Login</h3>
      <input type="password" id="adminPassword" placeholder="Enter password" class="form-input">
      <div class="form-buttons">
        <button onclick="loginAdmin()" class="save-btn">Login</button>
        <button onclick="closeAdminModal()" class="cancel-btn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Profile Section -->
  <header class="profile-section">
    <div class="profile-container">
      <div class="profile-avatar">
        <div class="avatar-circle">U</div>
      </div>
      <div class="profile-info">
        <h1 class="profile-name">Your Name</h1>
        <p class="profile-bio">Student · Developer · Bettendorf, IA</p>
      </div>
    </div>
  </header>

  <!-- Wishlist Section -->
  <main class="wishlist-section">
    <div class="section-header">
      <h2>Wishlist</h2>
      <button class="add-btn admin-only" onclick="toggleAddForm()" style="display:none;">+ Add Item</button>
    </div>

    <!-- Add Item Form (admin only) -->
    <div class="add-form" id="addForm">
      <input type="text" id="itemName" placeholder="Item name" class="form-input">
      <input type="text" id="itemPrice" placeholder="Price (optional)" class="form-input">
      <input type="url" id="itemLink" placeholder="Link (optional)" class="form-input">
      <div class="form-buttons">
        <button onclick="addItem()" class="save-btn">Save</button>
        <button onclick="toggleAddForm()" class="cancel-btn">Cancel</button>
      </div>
    </div>

    <!-- Wishlist Grid -->
    <div class="wishlist-grid" id="wishlistGrid">
      <!-- Items loaded from Firebase -->
    </div>
  </main>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getDatabase, ref, onValue, set, push, remove, update } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

    // TODO: Replace with your Firebase config
    const firebaseConfig = {
  apiKey: "AIzaSyAD87l-scYsGq_eX_LLXIuYy9CIyQN2SEY",
  authDomain: "wishlist-31551.firebaseapp.com",
  databaseURL: "https://wishlist-31551-default-rtdb.firebaseio.com",
  projectId: "wishlist-31551",
  storageBucket: "wishlist-31551.firebasestorage.app",
  messagingSenderId: "513351669307",
  appId: "1:513351669307:web:859850b58ecd3a1c7a6e1e",
  measurementId: "G-6NSSE0FTNN"
};

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    window.db = db;
    window.dbRef = ref;
    window.dbSet = set;
    window.dbPush = push;
    window.dbRemove = remove;
    window.dbUpdate = update;

    // Load wishlist items in real-time
    const wishlistRef = ref(db, 'wishlist');
    onValue(wishlistRef, (snapshot) => {
      const grid = document.getElementById('wishlistGrid');
      grid.innerHTML = '';
      
      const data = snapshot.val();
      if (data) {
        Object.keys(data).forEach(key => {
          const item = data[key];
          renderItem(key, item);
        });
      }
    });

    window.renderItem = function(id, item) {
      const grid = document.getElementById('wishlistGrid');
      const itemDiv = document.createElement('div');
      itemDiv.className = 'wishlist-item';
      itemDiv.dataset.id = id;
      
      const isAdmin = sessionStorage.getItem('isAdmin') === 'true';
      const isChecked = item.checked || false;
      
      itemDiv.innerHTML = `
        <div class="item-header">
          <label class="checkbox-container">
            <input type="checkbox" ${isChecked ? 'checked' : ''} onchange="toggleCheck('${id}', this.checked)">
            <span class="checkmark"></span>
          </label>
          <h3 class="item-name ${isChecked ? 'checked' : ''}">${escapeHtml(item.name)}</h3>
          <button class="delete-btn admin-only" onclick="deleteItem('${id}')" style="display:${isAdmin ? 'block' : 'none'};">×</button>
        </div>
        ${item.price ? `<p class="item-price">${escapeHtml(item.price)}</p>` : ''}
        ${item.link ? `<a href="${escapeHtml(item.link)}" target="_blank" class="item-link">View →</a>` : ''}
      `;
      
      grid.appendChild(itemDiv);
    };
  </script>

  <script src="script.js"></script>
</body>
</html>
