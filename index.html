<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wishlist</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Admin Login (top-right corner) -->
  <div class="admin-controls">
    <button id="adminBtn" class="admin-btn" onclick="toggleAdmin()">Admin</button>
    <button class="edit-profile-btn admin-only" onclick="openProfileEditor()" style="display:none;">Edit Profile</button>
  </div>

  <!-- Admin Password Modal -->
  <div class="modal" id="adminModal">
    <div class="modal-content">
      <h3>Admin Login</h3>
      <input type="password" id="adminPassword" placeholder="Enter password" class="form-input">
      <div class="form-buttons">
        <button onclick="loginAdmin()" class="save-btn">Login</button>
        <button onclick="closeAdminModal()" class="cancel-btn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Profile Editor Modal -->
  <div class="modal" id="profileModal">
    <div class="modal-content modal-large">
      <h3>Edit Profile</h3>
      <input type="text" id="editName" placeholder="Your Name" class="form-input">
      <input type="text" id="editTitle" placeholder="Title (e.g., Student · Developer)" class="form-input">
      <input type="text" id="editLocation" placeholder="Location" class="form-input">
      <textarea id="editBio" placeholder="About me / Bio (optional)" class="form-textarea"></textarea>
      <input type="text" id="editAvatar" placeholder="Avatar Letter (1 character)" class="form-input" maxlength="1">
      <input type="url" id="editWebsite" placeholder="Website URL (optional)" class="form-input">
      <input type="text" id="editInterests" placeholder="Interests (comma separated, optional)" class="form-input">
      <div class="form-buttons">
        <button onclick="saveProfile()" class="save-btn">Save Profile</button>
        <button onclick="closeProfileModal()" class="cancel-btn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Edit Item Modal -->
  <div class="modal" id="editItemModal">
    <div class="modal-content modal-large">
      <h3>Edit Item</h3>
      <input type="hidden" id="editItemId">
      <input type="text" id="editItemName" placeholder="Item name" class="form-input">
      <input type="text" id="editItemPrice" placeholder="Price (e.g., $50)" class="form-input">
      <input type="url" id="editItemLink" placeholder="Link (optional)" class="form-input">
      <input type="url" id="editItemImage" placeholder="Image URL (optional)" class="form-input">
      <select id="editItemTag" class="form-select">
        <option value="">No Tag</option>
        <option value="Birthday">🎂 Birthday</option>
        <option value="Christmas">🎄 Christmas</option>
        <option value="Graduation">🎓 Graduation</option>
        <option value="General">🎁 General</option>
      </select>
      <textarea id="editItemInfo" placeholder="Info / Details (optional)" class="form-textarea"></textarea>
      <div class="form-buttons">
        <button onclick="saveItemEdit()" class="save-btn">Save Changes</button>
        <button onclick="closeEditItemModal()" class="cancel-btn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Info Modal -->
  <div class="modal" id="infoModal">
    <div class="modal-content">
      <div class="info-header">
        <h3 id="infoItemName">Item Info</h3>
        <button class="modal-close" onclick="closeInfoModal()">×</button>
      </div>
      <div id="infoContent" class="info-content">
        No info available.
      </div>
    </div>
  </div>

  <!-- Profile Section -->
  <header class="profile-section">
    <div class="profile-container">
      <div class="profile-avatar">
        <div class="avatar-circle" id="avatarCircle">U</div>
      </div>
      <div class="profile-info">
        <h1 class="profile-name" id="profileName">Your Name</h1>
        <p class="profile-title" id="profileTitle">Student · Developer</p>
        <p class="profile-location" id="profileLocation">📍 Bettendorf, IA</p>
        <p class="profile-bio" id="profileBio" style="display:none;"></p>
        <div class="profile-meta" id="profileMeta" style="display:none;">
          <a href="#" id="profileWebsite" target="_blank" class="profile-link" style="display:none;">🔗 Website</a>
          <p class="profile-interests" id="profileInterests" style="display:none;"></p>
        </div>
      </div>
    </div>
  </header>

  <!-- Wishlist Section -->
  <main class="wishlist-section">
    <div class="section-header">
      <h2>Wishlist</h2>
      <button class="add-btn admin-only" onclick="toggleAddForm()" style="display:none;">+ Add Item</button>
    </div>

    <!-- Filter Controls -->
    <div class="filter-controls">
      <div class="filter-group">
        <button class="filter-btn active" onclick="filterByPrice('all')">All Prices</button>
        <button class="filter-btn" onclick="filterByPrice('under50')">Under $50</button>
        <button class="filter-btn" onclick="filterByPrice('50to100')">$50-$100</button>
        <button class="filter-btn" onclick="filterByPrice('over100')">Over $100</button>
      </div>
      <div class="filter-group">
        <button class="filter-btn active" onclick="filterByTag('all')">All Tags</button>
        <button class="filter-btn" onclick="filterByTag('Birthday')">🎂 Birthday</button>
        <button class="filter-btn" onclick="filterByTag('Christmas')">🎄 Christmas</button>
        <button class="filter-btn" onclick="filterByTag('Graduation')">🎓 Graduation</button>
        <button class="filter-btn" onclick="filterByTag('General')">🎁 General</button>
      </div>
    </div>

    <!-- Add Item Form -->
    <div class="add-form" id="addForm">
      <input type="text" id="itemName" placeholder="Item name" class="form-input">
      <input type="text" id="itemPrice" placeholder="Price (e.g., $50)" class="form-input">
      <input type="url" id="itemLink" placeholder="Link (optional)" class="form-input">
      <input type="url" id="itemImage" placeholder="Image URL (optional)" class="form-input">
      <select id="itemTag" class="form-select">
        <option value="">No Tag</option>
        <option value="Birthday">🎂 Birthday</option>
        <option value="Christmas">🎄 Christmas</option>
        <option value="Graduation">🎓 Graduation</option>
        <option value="General">🎁 General</option>
      </select>
      <textarea id="itemInfo" placeholder="Info / Details (optional)" class="form-textarea"></textarea>
      <div class="form-buttons">
        <button onclick="addItem()" class="save-btn">Save</button>
        <button onclick="toggleAddForm()" class="cancel-btn">Cancel</button>
      </div>
    </div>

    <!-- Wishlist Grid -->
    <div class="wishlist-grid" id="wishlistGrid"></div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <a href="https://www.perplexity.ai" target="_blank" class="footer-link">
      <span class="footer-text">Built with</span>
      <svg class="perplexity-logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="currentColor"/>
        <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span class="footer-brand">Perplexity</span>
    </a>
  </footer>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getDatabase, ref, onValue, set, push, remove, update } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

    const firebaseConfig = {
      apiKey: "AIzaSyAD87l-scYsGq_eX_LLXIuYy9CIyQN2SEY",
      authDomain: "wishlist-31551.firebaseapp.com",
      databaseURL: "https://wishlist-31551-default-rtdb.firebaseio.com",
      projectId: "wishlist-31551",
      storageBucket: "wishlist-31551.firebasestorage.app",
      messagingSenderId: "513351669307",
      appId: "1:513351669307:web:859850b58ecd3a1c7a6e1e",
      measurementId: "G-6NSSE0FTNN"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    window.db = db;
    window.dbRef = ref;
    window.dbSet = set;
    window.dbPush = push;
    window.dbRemove = remove;
    window.dbUpdate = update;

    // Load profile
    const profileRef = ref(db, 'profile');
    onValue(profileRef, (snapshot) => {
      const data = snapshot.val();
      if (data) {
        document.getElementById('profileName').textContent = data.name || 'Your Name';
        document.getElementById('avatarCircle').textContent = data.avatar || 'U';
        document.getElementById('profileTitle').textContent = data.title || 'Student · Developer';
        document.getElementById('profileLocation').textContent = '📍 ' + (data.location || 'Bettendorf, IA');
        
        const bioEl = document.getElementById('profileBio');
        if (data.bio) {
          bioEl.textContent = data.bio;
          bioEl.style.display = 'block';
        } else {
          bioEl.style.display = 'none';
        }
        
        const websiteEl = document.getElementById('profileWebsite');
        if (data.website) {
          websiteEl.href = data.website;
          websiteEl.style.display = 'inline-block';
          document.getElementById('profileMeta').style.display = 'block';
        } else {
          websiteEl.style.display = 'none';
        }
        
        const interestsEl = document.getElementById('profileInterests');
        if (data.interests) {
          interestsEl.textContent = '💡 ' + data.interests;
          interestsEl.style.display = 'block';
          document.getElementById('profileMeta').style.display = 'block';
        } else {
          interestsEl.style.display = 'none';
        }
      }
    });

    // Load wishlist items
    const wishlistRef = ref(db, 'wishlist');
    onValue(wishlistRef, (snapshot) => {
      const grid = document.getElementById('wishlistGrid');
      grid.innerHTML = '';
      
      const data = snapshot.val();
      window.wishlistData = data || {};
      
      if (data) {
        Object.keys(data).forEach(key => {
          const item = data[key];
          renderItem(key, item);
        });
      }
    });

    window.renderItem = function(id, item) {
      const grid = document.getElementById('wishlistGrid');
      const itemDiv = document.createElement('div');
      itemDiv.className = 'wishlist-item';
      itemDiv.dataset.id = id;
      itemDiv.dataset.price = item.price || '';
      itemDiv.dataset.tag = item.tag || '';
      
      const isAdmin = sessionStorage.getItem('isAdmin') === 'true';
      const isChecked = item.checked || false;
      const hasInfo = item.info && item.info.trim() !== '';
      const hasImage = item.image && item.image.trim() !== '';
      const hasTag = item.tag && item.tag.trim() !== '';
      
      let html = '';
      
      // Image
      if (hasImage) {
        html += `<img src="${escapeHtml(item.image)}" alt="${escapeHtml(item.name)}" class="item-image" onerror="this.style.display='none'">`;
      }
      
      // Tag
      if (hasTag) {
        const tagEmoji = item.tag === 'Birthday' ? '🎂' : item.tag === 'Christmas' ? '🎄' : item.tag === 'Graduation' ? '🎓' : '🎁';
        html += `<div class="item-tags"><span class="item-tag">${tagEmoji} ${escapeHtml(item.tag)}</span></div>`;
      }
      
      // Header
      html += `
        <div class="item-header">
          <label class="checkbox-container">
            <input type="checkbox" ${isChecked ? 'checked' : ''} onchange="toggleCheck('${id}', this.checked)">
            <span class="checkmark"></span>
          </label>
          <h3 class="item-name ${isChecked ? 'checked' : ''}">${escapeHtml(item.name)}</h3>
          <button class="delete-btn admin-only" onclick="deleteItem('${id}')" style="display:${isAdmin ? 'block' : 'none'};">×</button>
        </div>
      `;
      
      // Price
      if (item.price) {
        html += `<p class="item-price">${escapeHtml(item.price)}</p>`;
      }
      
      // Actions
      html += '<div class="item-actions">';
      if (item.link) {
        html += `<a href="${escapeHtml(item.link)}" target="_blank" class="item-link">View →</a>`;
      }
      if (hasInfo) {
        html += `<button class="info-btn-big" onclick="openInfo('${id}')">ℹ INFO</button>`;
      }
      if (isAdmin) {
        html += `<button class="edit-btn admin-only" onclick="openEditItem('${id}')">✎ EDIT</button>`;
      }
      html += '</div>';
      
      // Comments
      html += `<div class="item-comments" id="comments-${id}">
        <div class="comments-header">💬 Family Comments</div>
        <div id="comment-list-${id}"></div>
        <div class="comment-input-group">
          <input type="text" id="comment-input-${id}" placeholder="Your name" class="comment-input" style="max-width:120px;">
          <input type="text" id="comment-text-${id}" placeholder="Leave a comment..." class="comment-input">
          <button onclick="addComment('${id}')" class="comment-btn">Send</button>
        </div>
      </div>`;
      
      itemDiv.innerHTML = html;
      grid.appendChild(itemDiv);
      
      // Load comments
      if (item.comments) {
        Object.keys(item.comments).forEach(commentId => {
          const comment = item.comments[commentId];
          renderComment(id, comment);
        });
      }
    };

    window.renderComment = function(itemId, comment) {
      const commentList = document.getElementById('comment-list-' + itemId);
      const commentDiv = document.createElement('div');
      commentDiv.className = 'comment';
      commentDiv.innerHTML = `<span class="comment-author">${escapeHtml(comment.author)}:</span><span class="comment-text">${escapeHtml(comment.text)}</span>`;
      commentList.appendChild(commentDiv);
    };
  </script>

  <script src="script.js"></script>
</body>
</html>
